# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# scripts
# bind = $mainMod, F1, exec, $scripts/fastworkspaces/hyprland/inboxemails.sh
# bind = $mainMod, F2, exec, $scripts/fastworkspaces/hyprland/comms.sh
