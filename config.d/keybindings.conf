# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

$scripts = ~/Projects/scripts
$rofies  = $scripts/rofi
$hyprScripts =  ~/.config/hypr/scripts

# apps
bind = $mainMod, A, exec, $rofies/web/azure.sh --pick
bind = $mainMod SHIFT, A, exec, $rofies/web/n8n.sh

# bind = $mainMod, B, exec, $scripts/utils/browser/start.sh
bind = $mainMod, B, exec, $scripts/utils/browser/openbookmarks.sh

bind = $mainMod SHIFT, B, exec, $scripts/utils/browser/start-work.sh

bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod SHIFT, D, exec, $rofies/remotes/pick.sh

bind = $mainMod, ESCAPE, exec, $rofies/powermenu.sh
bind = $mainMod SHIFT, ESCAPE, exec, $HOME/.config/waybar/scripts/notifications toggle

# fullscreen
bind = $mainMod SHIFT, F, exec, $scripts/utils/hyprland/app/fullscreen.sh 1 # maximized
bind = $mainMod, F, exec, $scripts/utils/hyprland/app/fullscreen.sh

bind = $mainMod, G, exec, $rofies/web/github.sh work #excludes work
bind = $mainMod SHIFT, G, exec, $rofies/web/github.sh

bind = $mainMod, I, exec, $scripts/utils/browser/tolocalplayer.sh
bind = $mainMod SHIFT, I, exec, $scripts/fun/slideshow/rnd.sh

bind = $mainMod, M, exec, $scripts/utils/hyprland/app/toggle-noscreenshare.sh
bind = $mainMod SHIFT, M, exec, $rofies/anime.sh
# bind = $mainMod SHIFT, M, exec, $scripts/utils/hyprland/apps/manga.sh
# bind = $mainMod SHIFT ALT, M, exec, $rofies/web/twitch.sh

bind = $mainMod, O, exec, pypr toggle music
# bind = $mainMod CTRL, O, exec, freetube
bind = $mainMod SHIFT, O, exec, pypr shift_monitors +1

bind = $mainMod CTRL, P, exec, pypr toggle passwordmanager
bind = $mainMod ALT, P, pin
bind = $mainMod, P, exec, $rofies/code.sh work #excludes work
bind = $mainMod SHIFT, P, exec, $rofies/code.sh

bind = $mainMod, Print, exec, $scripts/utils/hyprland/screen/shot.sh #will show rofi menu
bind = SHIFT, Print, exec, $scripts/utils/hyprland/screen/shot.sh window
bind = , Print, exec, $scripts/utils/hyprland/screen/shot.sh output

bind = $mainMod, Q, exec, pavucontrol
bind = $mainMod SHIFT, Q, killactive,

bind = $mainMod, E, exec, $rofies/web/webapps.sh
bind = $mainMod SHIFT, E, exec, $scripts/utils/filebrowser/books-pick.sh --pick
bind = $mainMod, R, exec, $scripts/utils/hyprland/screen/capture.sh
bind = $mainMod SHIFT, R, exec, $scripts/utils/hyprland/reload.sh

bind = $mainMod, Return, exec, pypr toggle terminal
bind = $mainMod SHIFT, Return, exec, kitty

bind = $mainMod SHIFT, S, exec, $scripts/utils/hyprland/screen/shot.sh region
bind = $mainMod CTRL SHIFT, S, exec, hyprpicker -an
# all monitors: grim -t ppm - | satty --filename - --output-filename ~/Pictures/Screenshots/satty-$(date '+%Y%m%d-%H:%M:%S').png
# bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" -t ppm - | satty --filename - --output-filename ~/Pictures/Screenshots/satty-$(date '+%Y%m%d-%H:%M:%S').png

bind = $mainMod, T, exec, $scripts/utils/filebrowser/pick.sh
bind = $mainMod SHIFT, T, exec, $scripts/utils/filebrowser/pick.sh include-work
# bind = $mainMod SHIFT, T, exec, thunar ~/Projects/bizdocs/downloads
# bind = $mainMod SHIFT, T, exec, pypr expose
bind = ALT SHIFT, TAB, exec, $rofies/windows/any.sh
bind = ALT, TAB, exec, $rofies/windows/currentworkspace.sh
bind = $mainMod, TAB, exec, $HOME/.config/waybar/scripts/windows/list move-next
bind = $mainMod SHIFT, TAB, exec, $HOME/.config/waybar/scripts/windows/list move-previous
# bind = $mainMod SHIFT, TAB, cyclenext, prev
# bind = $mainMod SHIFT, TAB, changegroupactive, b

# tentar quando focus for vivaldi fazer fallthrough - pensar em alternativa
# waybar - emails por ler
# bind = $mainMod, V, exec, rofi -modi clipboard:$scripts/rofi/cliphist-rofi-img.sh -show clipboard -show-icons
bind = $mainMod SHIFT, V, exec, code /home/pncolvr/Projects/bizdocs/utils/clipboard-host
bind = $mainMod, V, exec, copyq show
# bind = SUPER, V, exec,  kitty --class clipse -e 'clipse'
# bind = $mainMod, Z, exec, tagwindow, work
bind = $mainMod , X, exec, $scripts/utils/hyprland/toggle-animations.sh
bind = $mainMod SHIFT, Y, focusurgentorlast
bind = $mainMod, Y, focuscurrentorlast
bind = $mainMod, Z, exec, pypr zoom ++0.5
bind = $mainMod SHIFT, Z, exec, pypr zoom --2.0

# binds meta+= 
bind = $mainMod, code:21, exec, qalculate-qt

# float
bind = $mainMod, SPACE, moveoutofgroup,
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod SHIFT, SPACE, centerwindow,

# focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# move windows around with keyboard

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


