# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

$scripts = ~/.config/hypr/scripts
$waybar  = ~/.config/waybar/scripts
$rofi    =  ~/.config/rofi/scripts

# apps
bind = $mainMod, A, exec, $rofi/anime.sh
bind = $mainMod SHIFT, A, exec, $rofi/web/azure.sh --pick

# think: move to browser config directory
bind = $mainMod, B, exec, $scripts/browser/openbookmarks.sh
bind = $mainMod SHIFT, B, exec, $scripts/browser/start-work.sh

bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod SHIFT, D, exec, $rofi/remotes/pick.sh

bind = $mainMod, E, exec, $rofi/web/webapps.sh

bind = $mainMod, ESCAPE, exec, $rofi/powermenu.sh
bind = $mainMod ALT, ESCAPE, exec, pavucontrol
bind = $mainMod SHIFT, ESCAPE, exec, $waybar/notifications toggle

# fullscreen
bind = $mainMod SHIFT, F, exec, $scripts/fullscreen.sh 1 # maximized
bind = $mainMod, F, exec, $scripts/fullscreen.sh

bind = $mainMod, G, exec, $rofi/web/github.sh work #excludes work
bind = $mainMod SHIFT, G, exec, $rofi/web/github.sh

bind = $mainMod, I, exec, $scripts/tolocalplayer.sh
bind = $mainMod SHIFT, I, exec, $scripts/rnd.sh $HOME/Pictures/streamers/

bind = $mainMod, K, submap, tools
bind = $mainMod SHIFT, K, exec, $scripts/filebrowser/books-pick.sh --pick

bind = $mainMod, M, exec, $scripts/toggle-noscreenshare.sh
bind = $mainMod SHIFT, M, exec, kitty --class kitty-musicplayer -e 'rmpc'

bind = $mainMod, N, submap, notes

bind = $mainMod SHIFT, N, exec, $rofi/web/n8n.sh

bind = $mainMod, P, exec, $rofi/code.sh work #excludes work
bind = $mainMod SHIFT, P, exec, $rofi/code.sh
bind = $mainMod ALT, P, exec, $scripts/toggle-pin.sh

bind = $mainMod, Print, exec, $scripts/screen/shot.sh #will show rofi menu
bind = $mainMod SHIFT, S, exec, $scripts/screen/shot.sh region
bind = SHIFT, Print, exec, $scripts/screen/shot.sh window
bind = , Print, exec, $scripts/screen/shot.sh output

bind = $mainMod, Q, exec, hyprctl kill
bind = $mainMod SHIFT, Q, killactive,

bind = $mainMod, R, exec, $scripts/screen/capture.sh
bind = $mainMod ALT, R, submap, resize
bind = $mainMod SHIFT, R, exec, $scripts/reload.sh

bind = $mainMod, Return, exec, $scripts/toggle-terminal.sh
bind = $mainMod SHIFT, Return, exec, kitty

bind = $mainMod CTRL SHIFT, S, exec, hyprpicker -an

bind = $mainMod, T, exec, $scripts/filebrowser/pick.sh work #excludes work
bind = $mainMod SHIFT, T, exec, $scripts/filebrowser/pick.sh

bind = ALT SHIFT, TAB, exec, $rofi/windows/any.sh
bind = ALT, TAB, exec, $rofi/windows/currentworkspace.sh
bind = $mainMod, TAB, exec, $waybar/windows/list move-next
bind = $mainMod SHIFT, TAB, exec, $waybar/windows/list move-previous

bind = $mainMod, V, exec, copyq show

bind = $mainMod, W, exec, bitwarden-desktop

bind = $mainMod, X, exec, $scripts/toggle-animations.sh

bind = $mainMod SHIFT, Y, focusurgentorlast
bind = $mainMod, Y, focuscurrentorlast

bind = $mainMod, Z, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod ALT, Z, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = $mainMod SHIFT, Z, exec, hyprctl -q keyword cursor:zoom_factor 1

# binds meta+= 
bind = $mainMod, code:21, exec, qalculate-qt

# float
bind = $mainMod, SPACE, moveoutofgroup,
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod SHIFT, SPACE, centerwindow,

# focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# move windows around with keyboard

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# audio

bind =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 1%+
bind =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 1%-

# workspaces

bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous
bindl=, XF86AudioStop, exec, playerctl --all-players stop
bindl=, XF86AudioMute, exec, playerctl --all-players 

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

