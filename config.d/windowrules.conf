# workaround to be able to open other apps and have them not be grouped

windowrule {
    name = dont_group_comms
    match:workspace = 3
    group = barred
}

windowrule {
    name = dont_group_code
    match:workspace = 4
    group = barred
}

windowrule {
    name = dont_group_rdp
    match:workspace = 10
    group = barred
}

# window rules 
# --------------------------------------------------------------------------

windowrule {
    name = browser_workspace
    match:class = org.qutebrowser.qutebrowser
    workspace = 1
}

workspace = 2, layout:master

windowrule {
    name = mpv_float
    match:class = ^(mpv.*)$
    float = on
    center = on
}

windowrule {
    name = mpv_rollback_tile_twitch
    workspace = 2
    match:class = mpv-twitch
    float = off
}

windowrule {
    name = comms_workspace
    match:class = ^(discord|teams-for-linux|signal)$
    group = set comms
    workspace = 3
    no_screen_share = on
}

windowrule {
    name = code_workspace
    match:class = code
    match:float = false
    group = set code
    workspace = 4
}

windowrule {
    name = code_dialogs_move_to_mouse
    match:class = code
    match:float = true
    move = (cursor_x-(window_w*0.5)) (max(25, cursor_y-(window_h*0.5)))
}

windowrule {
    name = game_workspace
    match:class = ^(steam|Bazecor|heroic)$
    workspace = 5
}

windowrule {
    name = reading_workspace
    match:class = ^(org\.pwmt\.zathura|bruno)$
    workspace = 8
}

windowrule {
    name = rdp_workspace
    match:class = com.freerdp.client.sdl3
    group = set rdp
    workspace = 10
    maximize = on
}

windowrule {
    name = center_windows
    match:class = ^(teams-for-linux|gimp)$
    match:title = ^(Save As|https://latourrettecnologies-my.sharepoint.com.*|Search Actions)$
    float = on
    center = on
    size = 900 700
}

windowrule {
    name = center_steam_login
    match:class = steam
    match:title = ^(Sign in to Steam)$
    match:float = true
    center = on
}

windowrule {
    name = center_windows_no_title
    match:class = ^(xdg-desktop-portal-gtk|org\.pulseaudio\.pavucontrol|com\.github\.hluk\.copyq|hyprland-share-picker|imv|io\.github\.Qalculate\.qalculate-qt|com\.gabm\.satty)$
    float = on
    center = on
    size = 900 700
}

windowrule {
    name = center_copyq
    match:class = ^(com\.github\.hluk\.copyq)$
    float = on
    center = on
    pin = on
}

windowrule {
    name = center_uxplay
    match:class = ^(uxplay)$
    float = on
    move = (monitor_w*0.78) (monitor_h*0.12)
}

windowrule {
    name = center_windows_hidden
    match:class = Bitwarden|kitty-musicplayer
    float = on
    center = on
    size = 900 700
    no_screen_share = on
}

windowrule {
    name = position_kitty_dropdown
    match:class = kitty-dropdown
    float = on
    pin = on
    move = (monitor_w*0.025) (monitor_h*0.63)
    size = (monitor_w*0.95) (monitor_h*0.35)
}

windowrule {
    name = center_webapps
    match:class = ^(qutebrowser-webapp|qutebrowser-youtube|.*-.*\.(com|org|tv).*)$
    float = on
    center = on
    size = 1500 900
}

windowrule {
    name = webapps_rollback_tile_twitch
    match:class = ^(qutebrowser-twitch.*)$
    float = off
}

windowrule {
    name = position_imv_rnd
    match:class = imv
    match:title = rnd
    pin = on
    size = 340 600
    move = 2200 820
}

windowrule {
    name = drag_drop
    match:class = dragon-drop
    pin = on
}

windowrule {
    name = pin_pip
    match:title = ^Picture in picture$
    float = on
    pin = on
    workspace = unset
}

# --------------------------------------------------------------------------

# layer rules 
# --------------------------------------------------------------------------
layerrule {
  name = hide_notifications
  no_screen_share = on
  match:namespace = swaync-notification-window
}

# --------------------------------------------------------------------------

# smart gaps (black magic)
# --------------------------------------------------------------------------
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = smart_gaps_tv
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = smart_gaps_f
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}

# --------------------------------------------------------------------------